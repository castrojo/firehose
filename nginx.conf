# Chainguard nginx runs nonroot on port 8080.
# Site is built with base: '/firehose' — files live under /usr/share/nginx/html/firehose/
# Access locally at http://localhost:8080/firehose/
server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/html text/css application/javascript application/json image/svg+xml font/woff2;

    # Long-lived cache for fingerprinted Astro assets
    location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
